[build]
  command = "npm install && npm run build"
  publish = ".next"
  base = "frontend"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_PUBLIC_BACKEND_URL = "https://your-render-backend-url.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
